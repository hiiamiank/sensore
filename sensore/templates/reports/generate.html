{% extends "base.html" %}
{% block title %}Generate Report | Sensore{% endblock %}
{% block page_title %}Generate Report — {{ profile.full_name }}{% endblock %}

{% block topbar_right %}
<a href="{% url 'clinician_patient_detail' profile.id %}" class="btn btn-secondary btn-sm">← Back</a>
{% endblock %}

{% block content %}
<div class="card" style="max-width:480px">
  <div class="card-title">Select Period</div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Start Date</label>
      <input type="date" name="period_start" class="form-control" required>
    </div>
    <div class="form-group">
      <label>End Date</label>
      <input type="date" name="period_end" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Generate</button>
  </form>
</div>
{% endblock %}
